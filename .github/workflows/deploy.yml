name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            git config --global --add safe.directory /opt/megahex
            cd /opt/megahex
            git fetch --all
            git reset --hard origin/main
            npm install --omit=dev
            chown -R megahex:megahex /opt/megahex
            systemctl restart megahex
            systemctl is-active megahex
